name: edge-image

# Build the rolling EDGE image from main so the Space (which pins `:edge`) and
# manual test jobs can use markers/features not yet in a release.
# Pushes `:edge` (mutable — always the latest main build) and `:edge-<sha>`
# (immutable — pin an exact build). Does NOT touch `:latest` and creates no
# release. Delete this file once the Space pins a released vX.Y.Z image.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/edge-image.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: edge-image
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push edge image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/glutamatt/hf-s3ream:edge
            ghcr.io/glutamatt/hf-s3ream:edge-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed ghcr.io/glutamatt/hf-s3ream:edge and :edge-${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo "The Space pins :edge; workers are spawned by the lister with this image." >> "$GITHUB_STEP_SUMMARY"
