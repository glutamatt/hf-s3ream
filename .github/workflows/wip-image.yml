name: wip-image

# TEMPORARY: build a WIP image from main so the Space (which pins `:wip`) and
# manual test jobs can use markers/features not yet in a release.
# Pushes `:wip` (mutable — always the latest branch build) and `:wip-<sha>`
# (immutable — pin an exact build). Does NOT touch `:latest` and creates no
# release. Delete this file once the Space pins a released vX.Y.Z image.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/wip-image.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: wip-image
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WIP image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/glutamatt/hf-s3ream:wip
            ghcr.io/glutamatt/hf-s3ream:wip-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed ghcr.io/glutamatt/hf-s3ream:wip and :wip-${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo "The Space pins :wip; workers are spawned by the lister with this image." >> "$GITHUB_STEP_SUMMARY"
