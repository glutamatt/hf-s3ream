name: release

on:
  push:
    tags:
      - 'v*.*.*'

# Required:
#   contents: write — gh release create / upload assets
#   packages: write — push image to ghcr.io
permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/glutamatt/hf-s3ream:${{ github.ref_name }}
            ghcr.io/glutamatt/hf-s3ream:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render submit scripts with pinned image tag
        run: |
          for tpl in submit hfjob; do
            sed "s|__IMAGE_TAG__|${GITHUB_REF_NAME}|g" "scripts/${tpl}.sh.tpl" > "${tpl}.sh"
            chmod +x "${tpl}.sh"
            # Sanity check: pinned tag must appear and placeholder must be gone.
            grep -q "DEFAULT_IMAGE_TAG=\"${GITHUB_REF_NAME}\"" "${tpl}.sh"
            ! grep -q '__IMAGE_TAG__' "${tpl}.sh"
          done

      - name: Create GitHub release and attach submit scripts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            --title "${GITHUB_REF_NAME}" \
            submit.sh hfjob.sh
